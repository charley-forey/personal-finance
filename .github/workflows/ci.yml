name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: personal_finance
        ports:
          - 5432:5432
      redis:
        image: redis:7
        ports:
          - 6379:6379
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/personal_finance
      REDIS_URL: redis://localhost:6379
      NODE_ENV: test
      TOKEN_ENCRYPTION_KEY: test-encryption-key-32-chars-min!!
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm install
      - run: npm run typecheck
      - run: npm run db:migrate --workspace=@pf/database
      - run: npm run build
      - run: npm run test --workspace=@pf/analytics
      - run: npm run test --workspace=@pf/api --if-present
